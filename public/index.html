<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#11130f">
  <title>사진 폴더 관리</title>
  <link rel="stylesheet" href="app.css">
</head>
<body class="admin-page">
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">REMOTE PHOTO SLIDES</p>
        <h1>사진 폴더 관리</h1>
        <p class="intro">선택한 폴더와 그 아래의 모든 JPG가 슬라이드쇼에 자동으로 반영됩니다.</p>
      </div>
      <a class="primary-link" href="slideshow.html">슬라이드쇼 열기</a>
    </header>

    <section class="status-card" aria-live="polite">
      <span class="status-dot" id="server-dot"></span>
      <div>
        <strong id="server-status">PC 서버 확인 중</strong>
        <p id="root-path">사진 폴더를 불러오고 있습니다.</p>
      </div>
    </section>

    <section class="panel">
      <div class="panel-heading">
        <div>
          <p class="section-label">현재 위치</p>
          <nav id="breadcrumbs" class="breadcrumbs" aria-label="현재 폴더"></nav>
        </div>
        <button id="select-current" class="soft-button" type="button">이 폴더 선택</button>
      </div>
      <div id="folder-list" class="folder-list" aria-live="polite"></div>
    </section>

    <section class="panel selected-panel">
      <div class="panel-heading">
        <div>
          <p class="section-label">재생 대상</p>
          <h2>선택한 폴더</h2>
        </div>
        <span id="selected-count" class="count-badge">0개</span>
      </div>
      <div id="selected-list" class="selected-list"></div>
      <div class="save-row">
        <p id="save-message" class="save-message"></p>
        <button id="save-selection" class="save-button" type="button">선택 저장</button>
      </div>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
