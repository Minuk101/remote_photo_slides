<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Remote Photo Slides</title>
  <link rel="stylesheet" href="slideshow.css">
</head>
<body>
  <main id="slideshow" aria-live="off">
    <img id="bg1" class="bg-layer" alt="">
    <img id="bg2" class="bg-layer" alt="">
    <img id="img1" class="main-img" alt="슬라이드 사진">
    <img id="img2" class="main-img" alt="슬라이드 사진">
  </main>
  <section id="empty-state" class="empty-state">
    <strong id="empty-title">사진을 불러오는 중</strong>
    <p id="empty-message">잠시만 기다려주세요.</p>
    <a href="/">사진 폴더 관리</a>
  </section>
  <div class="controls">
    <a href="/" aria-label="사진 폴더 관리">관리</a>
    <button id="fullscreen" type="button">전체화면</button>
  </div>
  <p id="connection-message" class="connection-message" aria-live="polite"></p>
  <script src="slideshow.js"></script>
</body>
</html>
